buildscript {
  ext.getExtOrDefault = { name ->
    return rootProject.ext.has(name) ? rootProject.ext.get(name) : project.properties['MdNativeQQ_' + name]
  }

  repositories {
    google()
    mavenCentral()
  }

  dependencies {
    classpath "com.android.tools.build:gradle:8.7.2"
    classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:${getExtOrDefault('kotlinVersion')}"
  }
}

apply plugin: "com.android.library"
apply plugin: "kotlin-android"

def getExtOrIntegerDefault(name) {
  return rootProject.ext.has(name) ? rootProject.ext.get(name) : (project.properties["MdNativeQQ_" + name]).toInteger()
}

android {
  namespace "com.mangdin.mdnativeqq"

  compileSdkVersion getExtOrIntegerDefault("compileSdkVersion")

  defaultConfig {
    minSdkVersion getExtOrIntegerDefault("minSdkVersion")
    targetSdkVersion getExtOrIntegerDefault("targetSdkVersion")
  }

  buildFeatures {
    buildConfig true
  }

  buildTypes {
    release {
      minifyEnabled false
    }
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_17
    targetCompatibility JavaVersion.VERSION_17
  }

  kotlinOptions {
    jvmTarget = "17"
  }

  packagingOptions {
    pickFirst "META-INF/INDEX.LIST"
    pickFirst "META-INF/io.netty.versions.properties"
  }
}

repositories {
  mavenCentral()
  google()
}

def kotlin_version = getExtOrDefault("kotlinVersion")

// ---- QQ Open SDK：必须由调用方手动放进 libs/ ----
def qqSdkFiles = fileTree(dir: 'libs', include: ['open_sdk*.jar', 'open_sdk*.aar'])
if (qqSdkFiles.isEmpty()) {
  throw new GradleException(
    "\n\n[md-native-qq] 未找到腾讯 QQ Open SDK Android 包。\n" +
    "请前往 https://wiki.connect.qq.com/sdk下载 下载最新 Android SDK，\n" +
    "把 open_sdk_xxx.jar 或 .aar 放入：\n" +
    "  ${project.projectDir}/libs/\n" +
    "详见 android/libs/PLACE_SDK_HERE.md\n"
  )
}

dependencies {
  implementation "com.facebook.react:react-android"
  implementation "org.jetbrains.kotlin:kotlin-stdlib:$kotlin_version"
  implementation "androidx.core:core:1.13.0"

  // 本地 libs/ 内的 QQ Open SDK（jar / aar 均可）
  implementation fileTree(dir: 'libs', include: ['open_sdk*.jar', 'open_sdk*.aar'])
}
